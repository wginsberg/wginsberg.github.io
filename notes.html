---
layout: default
title: Notes
extra_css:
- notes.css
---

<main>
  <section style="width: fit-content">
    <h2 style="margin: 0"><span role="presentation">></span>Notes</h2>
  </section>

  <ul>
    {% for post in site.posts %}
    <li class="section">
      <a href="{{ post.url }}" class="blog-link">
        <span style="color: blue; text-decoration: underline">{{ post.title }}</span>
        <span style="color: #757575">{{ post.date | date: "%B %d, %Y" }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</main>
